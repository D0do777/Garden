<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Jardin</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3e6;
  overflow:hidden;
}

/* HUD */
#topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:#ffffff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  z-index:10;
}

#menuBtn{
  font-size:22px;
  cursor:pointer;
}

#nextDay{
  background:#639922;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* Sidebar */
#sidebar{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:white;
  transition:0.3s;
  padding:10px;
  overflow:auto;
  z-index:20;
}

#sidebar.open{
  left:0;
}

/* Jardin */
#game{
  position:absolute;
  top:55px;
  bottom:0;
  left:0;
  right:0;
  overflow:hidden;
}

#grid{
  position:absolute;
  display:grid;
  grid-template-columns:repeat(10,60px);
  gap:4px;
  transform-origin:0 0;
}

.cell{
  width:60px;
  height:60px;
  background:#97C459;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:20px;
}

.cell.plant{
  background:#fbeaf0;
}

/* Shop items */
.item{
  padding:10px;
  border:1px solid #ccc;
  margin-bottom:5px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="menuBtn">☰</div>
  <div id="stats">💰 0</div>
  <button id="nextDay">Jour ➜</button>
</div>

<div id="sidebar"></div>

<div id="game">
  <div id="grid"></div>
</div>

<script>

/* === SAUVEGARDE === */
let save = JSON.parse(localStorage.getItem("gardenSave")) || {
  coins:50,
  grid:{},
  size:5,
  offsetX:0,
  offsetY:0
};

/* === CONFIG === */
const gridEl = document.getElementById("grid");

/* === SHOP === */
const items = [
  {id:"🌸", price:20},
  {id:"🌷", price:30},
  {id:"🌳", price:50}
];

let selected = null;

/* === MENU === */
const sidebar = document.getElementById("sidebar");
document.getElementById("menuBtn").onclick=()=>{
  sidebar.classList.toggle("open");
};

function renderShop(){
  sidebar.innerHTML="<h3>Boutique</h3>";
  items.forEach(it=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerText=it.id+" - "+it.price+"💰";
    div.onclick=()=>selected=it;
    sidebar.appendChild(div);
  });

  const expandBtn=document.createElement("div");
  expandBtn.className="item";
  expandBtn.innerText="➕ Agrandir";
  expandBtn.onclick=expand;
  sidebar.appendChild(expandBtn);
}

/* === GRID === */
function key(x,y){return x+"_"+y;}

function render(){
  gridEl.innerHTML="";
  document.getElementById("stats").innerText="💰 "+save.coins;

  const size=save.size;

  gridEl.style.gridTemplateColumns=`repeat(${size},60px)`;

  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      const div=document.createElement("div");
      div.className="cell";

      const k=key(x,y);

      if(save.grid[k]){
        div.classList.add("plant");
        div.innerText=save.grid[k];
      }

      div.onclick=()=>{
        if(selected && save.coins>=selected.price){
          save.coins-=selected.price;
          save.grid[k]=selected.id;
          saveGame();
          render();
        }
      };

      gridEl.appendChild(div);
    }
  }

  autoZoom();
}

/* === ZOOM AUTO === */
function autoZoom(){
  const size=save.size;
  let scale=1;

  if(size>10) scale=0.8;
  if(size>15) scale=0.6;
  if(size>25) scale=0.4;

  gridEl.style.transform=`scale(${scale})`;
}

/* === EXPANSION 4 DIRECTIONS === */
function expand(){
  save.size+=2;
  saveGame();
  render();
}

/* === DRAG === */
let dragging=false, startX, startY;

gridEl.onmousedown=e=>{
  dragging=true;
  startX=e.clientX-save.offsetX;
  startY=e.clientY-save.offsetY;
};

window.onmousemove=e=>{
  if(dragging){
    save.offsetX=e.clientX-startX;
    save.offsetY=e.clientY-startY;
    gridEl.style.transform+=` translate(${save.offsetX}px,${save.offsetY}px)`;
  }
};

window.onmouseup=()=>dragging=false;

/* === MOBILE SWIPE === */
gridEl.ontouchstart=e=>{
  dragging=true;
  startX=e.touches[0].clientX-save.offsetX;
  startY=e.touches[0].clientY-save.offsetY;
};

gridEl.ontouchmove=e=>{
  if(dragging){
    save.offsetX=e.touches[0].clientX-startX;
    save.offsetY=e.touches[0].clientY-startY;
    gridEl.style.transform+=` translate(${save.offsetX}px,${save.offsetY}px)`;
  }
};

gridEl.ontouchend=()=>dragging=false;

/* === JOUR SUIVANT === */
document.getElementById("nextDay").onclick=()=>{
  save.coins+=10;
  saveGame();
  render();
};

/* === SAVE === */
function saveGame(){
  localStorage.setItem("gardenSave",JSON.stringify(save));
}

/* INIT */
renderShop();
render();

</script>

</body>
</html>
